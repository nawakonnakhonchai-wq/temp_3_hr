name: Update Weather Data

on:
  repository_dispatch:
    types: [run-weather-update]
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # ให้สิทธิ์ในการเขียนไฟล์ลงใน repository
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests geojson

      - name: Run converter and summarizer
        run: |
          # สร้างโฟลเดอร์สำหรับเก็บข้อมูล (กรณีที่ยังไม่มี)
          mkdir -p history stats
          python convert.py
          python summarize.py

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # ตรวจสอบการเปลี่ยนแปลงไฟล์ในโฟลเดอร์ที่เกี่ยวข้อง
          git add weather_data.geojson history/ stats/
          
          # ตรวจสอบว่ามีการเปลี่ยนแปลงหรือไม่ก่อนสั่ง commit
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: weather data and stats" && git push)
